    { run = ["bash", "${HOME}/.local/bin/.nproc"] },
]

[[command]]
group       = "system"
name        = "swaync-test"
description = "Restart swaync and fire a suite of test notifications"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.swaync-test"], ignore_failure = true },
]

