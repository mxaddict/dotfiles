description = "Refresh Arch mirrorlist — fastest 20 HTTPS mirrors via reflector"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.mirror"] },
]

[[command]]
group       = "system"
name        = "firmup"
description = "Update firmware via fwupdmgr"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.firmup"] },
]

[[command]]
group       = "system"
name        = "swap"
description = "Create/resize swap file and update hibernation kernel params (requires root)"
platform    = "linux"
steps = [
    # btrfs/filefrag/mkinitcpio/cmdline manipulation — kept as single shell step.
    { run = ["bash", "${HOME}/.local/bin/.swap"] },
