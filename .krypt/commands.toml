# Custom commands — krypt <group> <name> subcommands.
# Included by .krypt.toml
#
# Migration note: scripts with complex bash control flow (loops, case
# statements, associative arrays, btrfs logic) are wrapped as a single
# `run = ["bash", "<script>"]` step rather than being transposed into native
# step primitives.  That is intentional — zero-bash purity is #34's scope.

# ---------------------------------------------------------------------------
# menu group
# ---------------------------------------------------------------------------

[[command]]
group       = "menu"
name        = "apps"
description = "Application launcher (drun via pikr)"
platform    = "linux"
steps = [
    { run = ["bash", "-c", "pkill pikr || pikr -s drun -p Apps"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "power"
description = "Power action picker (lock/sleep/hibernate/shutdown/logout/reboot)"
platform    = "linux"
steps = [
    # case-statement control flow — kept as single shell step.
    { run = ["bash", "${HOME}/.local/bin/.menu-power"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "wifi"
description = "Wi-Fi network picker via nmcli + pikr"
platform    = "linux"
steps = [
    # nmcli parsing + conditional connect flow — kept as single shell step.
    { run = ["bash", "${HOME}/.local/bin/.menu-wifi"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "audio"
description = "Audio mixer (wiremix) in a floating alacritty window"
platform    = "linux"
steps = [
    { run = ["alacritty", "--class", "floating", "-e", "wiremix", "--tab", "output"] },
]

[[command]]
group       = "menu"
name        = "bluetooth"
description = "Bluetooth TUI (bluetui) in a floating alacritty window"
platform    = "linux"
steps = [
    { run = ["alacritty", "--class", "floating", "-e", "bluetui"] },
]

[[command]]
group       = "menu"
name        = "calc"
description = "Interactive qalculate history picker via pikr"
platform    = "linux"
steps = [
    # while loop + regex state — kept as single shell step.
    { run = ["bash", "${HOME}/.local/bin/.menu-calc"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "emoji"
description = "Emoji picker — copies selection to clipboard and types it"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.menu-emoji"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "emoji-update"
description = "Re-download emoji database from emojilib v4"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.menu-emoji-update"] },
]

[[command]]
group       = "menu"
name        = "pass"
description = "Password store picker — type password / user / otp / auth"
platform    = "linux"
steps = [
    # Multi-mode + wtype automation — kept as single shell step.
    { run = ["bash", "${HOME}/.local/bin/.menu-pass"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "autofill"
description = "Autofill password for the active window title using pass"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.menu-autofill"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "time"
description = "Timezone picker — updates system timezone and restarts waybar"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.menu-time"], ignore_failure = true },
]

[[command]]
group       = "menu"
name        = "top"
description = "System monitor (btop) in a floating alacritty window"
platform    = "linux"
steps = [
    { run = ["alacritty", "--class", "bloating", "-e", "btop"] },
]

[[command]]
group       = "menu"
name        = "mail"
description = "Email account picker → opens Himalaya in Neovim"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.menu-mail"], ignore_failure = true },
]

# Battery scripts (.batrep, .batlog, .batclear) absorbed into the native
# `krypt battery {report,log,clear}` builtin (#28). No [[command]] entry
# needed — invoke the builtin directly.

# ---------------------------------------------------------------------------
# kanata group
# ---------------------------------------------------------------------------

[[command]]
group       = "kanata"
name        = "toggle"
description = "Toggle the kanata.service systemd unit (keyboard remapper)"
platform    = "linux"
steps = [
    { run = ["bash", "${HOME}/.local/bin/.kanata"], ignore_failure = true },
]

# ---------------------------------------------------------------------------
# env group
# ---------------------------------------------------------------------------

[[command]]
group       = "env"
name        = "up"
description = "Upload .env.* files for the current project to a GCS bucket"
steps = [
    { if = "command_exists:gcloud", run = ["bash", "${HOME}/.local/bin/.envup"] },
]

[[command]]
group       = "env"
name        = "down"
description = "Download .env.* files for the current project from a GCS bucket"
steps = [
    { if = "command_exists:gcloud", run = ["bash", "${HOME}/.local/bin/.envdown"] },
]

# ---------------------------------------------------------------------------
# tmux group
# ---------------------------------------------------------------------------

[[command]]
group       = "tmux"
name        = "open"
description = "Open (or attach to) a tmux session named after the current directory"
steps = [
    { if = "command_exists:tmux", run = ["bash", "${HOME}/.local/bin/t"] },
]

# ---------------------------------------------------------------------------
# system group
# ---------------------------------------------------------------------------

[[command]]
group       = "system"
