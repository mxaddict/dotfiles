    "libssl-dev", "nodejs", "npm", "opencode", "pkg-config", "python3",
    "python3-venv", "rustup",
]
dnf = [
    "nodejs", "npm", "opencode",
]
brew = [
    "bear", "doctl", "lazygit", "nodejs", "npm", "opencode", "rustup",
]

