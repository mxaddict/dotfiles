# Dependency groups — cross-distro package mappings.
# Included by .krypt.toml

[[deps]]
group = "core"
pacman = [
    "alacritty", "bat", "btop", "curl", "eza", "fastfetch", "fd", "fish",
    "fzf", "git", "jq", "neovim", "ripgrep", "starship", "stow", "tealdeer",
    "tmux", "unzip", "wget", "zoxide",
]
apt = [
    "alacritty", "bat", "btop", "curl", "eza", "fastfetch", "fd-find", "fish",
    "fzf", "git", "jq", "neovim", "ripgrep", "stow", "tealdeer", "tmux",
    "unzip", "wget", "zoxide",
]
dnf = [
    "alacritty", "bat", "eza", "fastfetch", "fd-find", "fish", "fzf", "git",
    "jq", "neovim", "ripgrep", "stow", "tealdeer", "tmux", "unzip", "zoxide",
]
brew = [
    "alacritty", "bat", "btop", "eza", "fastfetch", "fd", "fish", "fzf",
    "git", "jq", "neovim", "ripgrep", "starship", "stow", "tealdeer", "tmux",
    "unzip", "wget", "zoxide",
]

[[deps]]
group = "dev"
pacman = [
    "bear", "doctl", "github-cli", "glab", "lazygit", "nodejs", "npm",
    "opencode", "python-tldextract", "rustup",
]
