# Links — deploy files / dirs from the repo into $HOME
# Included by .krypt.toml

# --- Root dotfiles ---
[[link]]
src = ".gitconfig"
dst = "${HOME}/.gitconfig"

[[link]]
src = ".gtkrc-2.0"
dst = "${HOME}/.gtkrc-2.0"

[[link]]
src = ".clang-format"
dst = "${HOME}/.clang-format"

[[link]]
src = ".editorconfig"
dst = "${HOME}/.editorconfig"

[[link]]
src = ".prettierrc"
dst = "${HOME}/.prettierrc"

[[link]]
src = ".prettierignore"
dst = "${HOME}/.prettierignore"

# --- .config subdirs (glob per subdir) ---

[[link]]
src_glob = ".config/alacritty/**/*"
dst = "${XDG_CONFIG}/alacritty/"

[[link]]
src_glob = ".config/bat/**/*"
dst = "${XDG_CONFIG}/bat/"

[[link]]
src_glob = ".config/cargo/**/*"
dst = "${XDG_CONFIG}/cargo/"

[[link]]
src_glob = ".config/dconf/**/*"
dst = "${XDG_CONFIG}/dconf/"

[[link]]
src_glob = ".config/fish/**/*"
dst = "${XDG_CONFIG}/fish/"

[[link]]
src_glob = ".config/gh/**/*"
dst = "${XDG_CONFIG}/gh/"

[[link]]
src_glob = ".config/gtk-3.0/**/*"
dst = "${XDG_CONFIG}/gtk-3.0/"

[[link]]
src_glob = ".config/gtk-4.0/**/*"
dst = "${XDG_CONFIG}/gtk-4.0/"

# Hyprland: only versioned files; the live *.conf (apps.conf, input.conf,
# monitors.conf, hyprpaper.conf, workspaces.conf) are gitignored and managed
# via [[template]] entries in .krypt.toml.
[[link]]
src = ".config/hypr/hyprland.conf"
dst = "${XDG_CONFIG}/hypr/hyprland.conf"

[[link]]
src = ".config/hypr/hypridle.conf"
dst = "${XDG_CONFIG}/hypr/hypridle.conf"

[[link]]
src = ".config/hypr/hyprlock.conf"
dst = "${XDG_CONFIG}/hypr/hyprlock.conf"

[[link]]
src = ".config/hypr/hyprqt6engine.conf"
dst = "${XDG_CONFIG}/hypr/hyprqt6engine.conf"

[[link]]
src = ".config/hypr/exfil.png"
dst = "${XDG_CONFIG}/hypr/exfil.png"

[[link]]
src_glob = ".config/lazygit/**/*"
dst = "${XDG_CONFIG}/lazygit/"

[[link]]
src_glob = ".config/MangoHud/**/*"
dst = "${XDG_CONFIG}/MangoHud/"

[[link]]
src_glob = ".config/mpv/**/*"
dst = "${XDG_CONFIG}/mpv/"

[[link]]
src_glob = ".config/nushell/**/*"
dst = "${XDG_CONFIG}/nushell/"

[[link]]
src_glob = ".config/nvim/**/*"
dst = "${XDG_CONFIG}/nvim/"

[[link]]
src_glob = ".config/nwg-look/**/*"
dst = "${XDG_CONFIG}/nwg-look/"

[[link]]
src_glob = ".config/rofi/**/*"
dst = "${XDG_CONFIG}/rofi/"

[[link]]
src_glob = ".config/swaync/**/*"
dst = "${XDG_CONFIG}/swaync/"

[[link]]
src_glob = ".config/tealdeer/**/*"
dst = "${XDG_CONFIG}/tealdeer/"

[[link]]
src_glob = ".config/tmux/**/*"
dst = "${XDG_CONFIG}/tmux/"

[[link]]
src_glob = ".config/waybar/**/*"
dst = "${XDG_CONFIG}/waybar/"

[[link]]
src_glob = ".config/xsettingsd/**/*"
dst = "${XDG_CONFIG}/xsettingsd/"

[[link]]
src = ".config/chromium-flags.conf"
dst = "${XDG_CONFIG}/chromium-flags.conf"

[[link]]
src = ".config/mimeapps.list"
dst = "${XDG_CONFIG}/mimeapps.list"

[[link]]
src = ".config/starship.toml"
dst = "${XDG_CONFIG}/starship.toml"

[[link]]
src = ".config/user-dirs.dirs"
dst = "${XDG_CONFIG}/user-dirs.dirs"

[[link]]
src = ".config/user-dirs.locale"
dst = "${XDG_CONFIG}/user-dirs.locale"

[[link]]
src_glob = ".config/opencode/**/*"
dst = "${XDG_CONFIG}/opencode/"

# --- .local/bin utility + menu scripts ---
# Battery scripts (.batrep/.batlog/.batclear) absorbed into the native
# `krypt battery {report,log,clear}` builtin — no link entries needed.

[[link]]
src = ".local/bin/.browser"
dst = "${LOCAL_BIN}/.browser"

[[link]]
src = ".local/bin/.clear"
dst = "${LOCAL_BIN}/.clear"

[[link]]
src = ".local/bin/.clearkeys"
dst = "${LOCAL_BIN}/.clearkeys"

[[link]]
src = ".local/bin/.envdown"
dst = "${LOCAL_BIN}/.envdown"

[[link]]
src = ".local/bin/.envup"
dst = "${LOCAL_BIN}/.envup"

[[link]]
src = ".local/bin/.firmup"
dst = "${LOCAL_BIN}/.firmup"

[[link]]
src = ".local/bin/.kanata"
dst = "${LOCAL_BIN}/.kanata"

# .menu-apps / .menu-audio / .menu-bluetooth / .menu-top wrappers
# removed — krypt's `commands.toml` invokes the underlying tools
