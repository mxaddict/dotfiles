# Ollama profile — change base_url to point at your Ollama host.
# Default assumes Ollama running on localhost:11434. For a remote box, set
# something like "http://your-host.lan:11434/v1/".
[profiles.ollama-launch]
openai_base_url = "http://localhost:11434/v1/"
forced_login_method = "api"
model_provider = "ollama-launch"

[model_providers.ollama-launch]
name = "Ollama"
base_url = "http://localhost:11434/v1/"

[tui]
theme = "nord"

[tui.model_availability_nux]
"gpt-5.6-sol" = 1

[projects."/home/mxaddict/Projects/kryptic-sh"]
trust_level = "trusted"
