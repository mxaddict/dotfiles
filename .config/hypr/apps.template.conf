# User-configurable app launchers used by hyprland.conf binds.
# Edit this file (not hyprland.conf) to swap your defaults.
# Hyprland variables must be declared before they are used.

$terminal    = alacritty
$browser     = ~/.local/bin/.browser
$filemanager = nautilus -w
$lock        = hyprlock
$colorpicker = hyprpicker --no-fancy --autocopy
$screenshot  = grimblast --notify --freeze copysave area
$record      = kooha
$notify      = swaync-client
